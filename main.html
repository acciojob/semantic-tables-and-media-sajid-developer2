<!DOCTYPE html>
<html>
<head>
  <title>Semantic Tables and Media</title>
</head>
<body>
  <table border="1" cellpadding="8" cellspacing="0">
    <thead>
      <tr>
        <th>Roll numbers</th>
        <th>Names</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>1</td>
        <td>John</td>
      </tr>
      <tr>
        <td>2</td>
        <td>Jane</td>
      </tr>
      <tr>
        <td>3</td>
        <td>Sam</td>
      </tr>
    </tbody>
  </table>

  <h2>List of medias</h2>

  <ol>
    <li>
      <img src="https://picsum.photos/id/123/200/300" alt="Media image">
    </li>
    <li>
      <video controls>
        <source src="http://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4">
      </video>
    </li>
    <li>
      <audio controls>
        <source src="http://commondatastorage.googleapis.com/codeskulptor-assets/Epoq-Lepidoptera.ogg">
      </audio>
    </li>
  </ol>
</body>
</html>
